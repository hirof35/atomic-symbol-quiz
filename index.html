<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆速！元素記号クイズ (完遂版)</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; position: relative; }
        .status-bar { display: flex; justify-content: space-between; font-size: 14px; color: #7f8c8d; margin-bottom: 10px; }
        .symbol-box { font-size: 80px; font-weight: bold; color: #2c3e50; margin: 20px 0; min-height: 120px; display: flex; align-items: center; justify-content: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        input[type="text"]:focus { border-color: #3498db; }
        button { padding: 12px 24px; font-size: 16px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        .message { font-size: 18px; font-weight: bold; min-height: 27px; margin-top: 15px; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
        
        /* 非表示用スタイル */
        .hidden { display: none !important; }
        
        /* クリア画面の装飾 */
        .clear-title { color: #f1c40f; font-size: 32px; margin-bottom: 10px; }
        .restart-btn { background: #2ecc71; width: 100%; margin-top: 20px; }
        .restart-btn:hover { background: #27ae60; }
    </style>
</head>
<body>

<div class="card">
    <div id="quizView">
        <div class="status-bar">
            <span id="progressText">第 1 問</span>
            <span id="scoreText">残り: -- 元素</span>
        </div>
        <h2>🧪 元素記号クイズ</h2>
        <p>この記号の元素名は？</p>
        
        <div class="symbol-box" id="symbol">--</div>

        <div class="input-group">
            <input type="text" id="answerInput" placeholder="元素名を入力" autocomplete="off">
            <button id="submitBtn">回答</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <div id="clearView" class="hidden">
        <div class="clear-title">👑 CLEAR! 👑</div>
        <h2>全問正解おめでとう！</h2>
        <p>用意されたすべての元素をマスターしました！</p>
        <div style="font-size: 64px; margin: 20px 0;">🎉</div>
        <button id="restartBtn" class="restart-btn">もう一度挑戦する</button>
    </div>
</div>

<script>
    let allElements = [];      // サーバーから取得した全データ
    let remainingElements = [];// まだ出題していないデータのプール
    let currentElement = null; // 現在出題中の元素
    let questionCount = 0;     // 何問目か

    // アプリ起動時にまず全元素のリストをAPIから取得する
    async function initGame() {
        try {
            const response = await fetch('/api/elements');
            allElements = await response.json();
            
            // ゲームのリセット処理へ
            resetGame();
        } catch (error) {
            console.error("データの初期化に失敗しました:", error);
            document.getElementById("symbol").innerText = "Error";
        }
    }

    // ゲーム状態を最初に戻す
    function resetGame() {
        remainingElements = [...allElements];
        questionCount = 0;
        
        document.getElementById("quizView").classList.remove("hidden");
        document.getElementById("clearView").classList.add("hidden");
        document.getElementById("message").innerText = "";
        
        nextQuestion();
    }

    // 被りなしで次の問題を取り出す関数
    function nextQuestion() {
        if (remainingElements.length === 0) {
            showClearScreen();
            return;
        }

        questionCount++;
        document.getElementById("answerInput").value = "";
        document.getElementById("answerInput").focus();

        const randomIndex = Math.floor(Math.random() * remainingElements.length);
        currentElement = remainingElements.splice(randomIndex, 1)[0];

        document.getElementById("symbol").innerText = currentElement.symbol;
        document.getElementById("progressText").innerText = `第 ${questionCount} 問`;
        document.getElementById("scoreText").innerText = `残り: ${remainingElements.length} 元素`;
    }

    // 答え合わせの処理
    function checkAnswer() {
        if (!currentElement) return;

        const userInput = document.getElementById("answerInput").value.trim();
        const messageEl = document.getElementById("message");

        if (userInput === currentElement.name) {
            messageEl.innerText = "🎉 正解！";
            messageEl.className = "message success";
            
            setTimeout(() => {
                messageEl.innerText = "";
                nextQuestion();
            }, 1000);
        } else {
            messageEl.innerText = `❌ 残念！違います（ヒント: ${currentElement.symbol}）`;
            messageEl.className = "message error";
            document.getElementById("answerInput").value = "";
            document.getElementById("answerInput").focus();
        }
    }

    function showClearScreen() {
        document.getElementById("quizView").classList.add("hidden");
        document.getElementById("clearView").classList.remove("hidden");
    }

    document.getElementById("submitBtn").addEventListener("click", checkAnswer);
    document.getElementById("answerInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") checkAnswer();
    });
    document.getElementById("restartBtn").addEventListener("click", resetGame);

    initGame();
</script>

</body>
</html>
